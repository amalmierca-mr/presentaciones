<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Decathlon x Havas Play</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'Syne',sans-serif;overflow-x:hidden;cursor:none;}
:root{--black:#050505;--dark:#0D0F1A;--gray:#1A1A1A;--purple:#7B4FFF;--purple-light:#9D77FF;--fuchsia:#C8177A;--yellow:#F5E642;--white:#F0EEE8;}

/* CURSOR */
.cursor{position:fixed;width:12px;height:12px;background:var(--yellow);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .3s,height .3s;mix-blend-mode:difference;}
.cursor-follower{position:fixed;width:40px;height:40px;border:1px solid rgba(123,79,255,.6);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s ease;}

/* PRELOADER */
#preloader{position:fixed;inset:0;background:var(--black);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity .8s ease,visibility .8s ease;}
#preloader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.pl-logo{font-family:'Bebas Neue',cursive;font-size:clamp(60px,12vw,120px);letter-spacing:.05em;background:linear-gradient(135deg,var(--purple),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:pulseLogo 1.2s ease-in-out infinite alternate;}
@keyframes pulseLogo{from{opacity:.4}to{opacity:1}}
.pl-sub{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.3em;color:rgba(255,255,255,.4);text-transform:uppercase;}
.pl-bar{width:200px;height:2px;background:var(--gray);overflow:hidden;}
.pl-progress{height:100%;background:linear-gradient(90deg,var(--purple),var(--yellow));width:0;animation:loadBar 2.2s ease forwards;}
@keyframes loadBar{to{width:100%}}

/* PROGRESS BAR */
#progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--yellow));z-index:1000;transition:width .1s linear;width:0%;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;padding:28px 48px;display:flex;justify-content:space-between;align-items:center;z-index:500;}
.nav-logo{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:.12em;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--purple);}
.nav-right{display:flex;align-items:center;gap:20px;}
.nav-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;color:rgba(255,255,255,.3);text-transform:uppercase;}
.nav-dots{display:flex;gap:6px;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .3s ease;}
.nav-dot.active{background:var(--yellow);transform:scale(1.5);}

/* SCROLL HINT */
#scroll-hint{position:fixed;bottom:36px;right:48px;display:flex;align-items:center;gap:12px;opacity:1;transition:opacity .5s ease;z-index:500;}
#scroll-hint.hidden{opacity:0;pointer-events:none;}
.hint-text{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.4);text-transform:uppercase;}
.hint-arrow{display:flex;gap:4px;animation:arrowPulse 1.5s ease infinite;}
@keyframes arrowPulse{0%,100%{opacity:.3;transform:translateX(0)}50%{opacity:1;transform:translateX(6px)}}
.hint-arrow span{width:6px;height:6px;border-right:1.5px solid var(--yellow);border-top:1.5px solid var(--yellow);transform:rotate(45deg);}

/* LAYOUT */
#scroll-container{display:flex;height:100vh;overflow:hidden;}
#panels-wrapper{display:flex;height:100vh;will-change:transform;}
.panel{min-width:100vw;height:100vh;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}

/* REVEAL */
.reveal-el{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease;}
.reveal-el.revealed{opacity:1;transform:translateY(0);}

/* PANEL LABEL */
.panel-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.4em;color:var(--yellow);text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.panel-label::before{content:'';display:inline-block;width:24px;height:1px;background:var(--yellow);}

/* TAGS */
.tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;padding:4px 10px;border:1px solid rgba(123,79,255,.35);color:var(--purple-light);text-transform:uppercase;display:inline-block;margin:3px;}
.tag.fuchsia{border-color:rgba(200,23,122,.4);color:#E05BA0;}
.tag.yellow{border-color:rgba(245,230,66,.35);color:var(--yellow);}

/* BG ANIMATIONS */
@keyframes gridMove{from{background-position:0 0}to{background-position:80px 80px}}
@keyframes orbPulse{from{transform:translate(-50%,-50%) scale(.9);opacity:.6}to{transform:translate(-50%,-50%) scale(1.1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scrollLine{0%,100%{transform:scaleY(1);opacity:.4}50%{transform:scaleY(.5);opacity:1}}

/* ══ COVER ══ */
.panel-cover{background:var(--dark);}
.cover-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(123,79,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(123,79,255,.06) 1px,transparent 1px);background-size:80px 80px;animation:gridMove 20s linear infinite;}
.cover-orb{position:absolute;width:700px;height:700px;background:radial-gradient(circle,rgba(123,79,255,.2) 0%,transparent 70%);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:orbPulse 4s ease-in-out infinite alternate;}
.cover-content{position:relative;z-index:2;text-align:center;max-width:1100px;padding:0 60px;}
.cover-eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.4em;color:var(--purple-light);text-transform:uppercase;margin-bottom:32px;opacity:0;animation:fadeUp .8s ease 2.5s forwards;}
.cover-headline{font-family:'Bebas Neue',cursive;font-size:clamp(64px,11vw,130px);line-height:.92;letter-spacing:.02em;margin-bottom:36px;opacity:0;animation:fadeUp .8s ease 2.7s forwards;}
.cover-headline .hl-purple{color:var(--purple);}
.cover-headline .hl-yellow{color:var(--yellow);}
.cover-meta{display:flex;align-items:center;justify-content:center;gap:32px;flex-wrap:wrap;opacity:0;animation:fadeUp .8s ease 2.9s forwards;margin-bottom:48px;}
.cover-meta-item{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.4);text-transform:uppercase;}
.cover-meta-item strong{color:var(--white);font-family:'Syne',sans-serif;font-size:13px;}
.cover-meta-sep{width:1px;height:28px;background:rgba(255,255,255,.12);}
.cover-badges{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp .8s ease 3.1s forwards;}
.cover-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:8px 18px;border:1px solid rgba(123,79,255,.4);color:var(--purple-light);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
.cover-scroll-cta{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.25);text-transform:uppercase;opacity:0;animation:fadeUp .8s ease 3.4s forwards;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;}
.cover-scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--purple),transparent);animation:scrollLine 2s ease-in-out infinite;}

/* ══ QUOTE ══ */
.panel-quote{background:var(--dark);}
.quote-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(123,79,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(123,79,255,.04) 1px,transparent 1px);background-size:80px 80px;animation:gridMove 20s linear infinite;}
.quote-orb{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(123,79,255,.15) 0%,transparent 70%);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:orbPulse 5s ease-in-out infinite alternate;}
.quote-inner{position:relative;z-index:2;text-align:center;max-width:900px;padding:0 80px;}
.quote-mark{font-family:'Bebas Neue',cursive;font-size:120px;color:var(--purple);line-height:.6;display:block;margin-bottom:16px;opacity:.35;}
.quote-text{font-family:'Syne',sans-serif;font-size:clamp(24px,3.2vw,42px);font-weight:700;line-height:1.25;color:var(--white);margin-bottom:40px;letter-spacing:-.01em;}
.quote-text .hl-purple{color:var(--purple-light);}
.quote-text .hl-yellow{color:var(--yellow);}
.quote-text .hl-fuchsia{color:var(--fuchsia);}
.quote-divider{width:48px;height:2px;background:linear-gradient(90deg,var(--purple),var(--fuchsia));margin:0 auto 32px;}
.quote-attribution{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.35);}

/* ══ PANEL 2 — HAVAS PLAY (custom split) ══ */
.panel-hp{background:#070711;}
.hp-split{display:grid;grid-template-columns:1fr 1fr;width:100%;height:100%;}
.hp-left{background:var(--dark);display:flex;align-items:center;justify-content:center;padding:80px 60px;border-right:1px solid rgba(123,79,255,.2);position:relative;overflow:hidden;}
.hp-left::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(123,79,255,.03) 4px,rgba(123,79,255,.03) 8px);}
.hp-left-inner{position:relative;z-index:2;text-align:center;width:100%;}
.hp-left-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.4em;color:var(--yellow);text-transform:uppercase;margin-bottom:32px;display:flex;align-items:center;gap:12px;justify-content:center;}
.hp-left-label::before{content:'';display:inline-block;width:24px;height:1px;background:var(--yellow);}
.hp-from{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.35em;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:12px;}
.hp-big-word{font-family:'Bebas Neue',cursive;font-size:clamp(48px,7vw,88px);color:transparent;-webkit-text-stroke:2px var(--purple);line-height:.95;display:block;margin-bottom:6px;}
.hp-arrow{font-family:'Bebas Neue',cursive;font-size:clamp(28px,3.5vw,44px);color:var(--yellow);display:block;margin:6px 0;}
.hp-to-word{font-family:'Bebas Neue',cursive;font-size:clamp(48px,7vw,88px);color:var(--purple);line-height:.95;display:block;}
.hp-shifts{display:flex;flex-direction:column;gap:10px;margin-top:28px;text-align:left;}
.hp-shift{display:flex;align-items:center;gap:12px;padding:10px 16px;background:rgba(123,79,255,.1);border:1px solid rgba(123,79,255,.2);}
.hp-shift-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);min-width:90px;}
.hp-shift-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);}
.hp-shift-arr{font-family:'DM Mono',monospace;font-size:14px;color:var(--yellow);margin-left:auto;flex-shrink:0;}
.hp-right{display:flex;align-items:center;padding:80px 60px;background:#070711;}
.hp-block{max-width:480px;}
.hp-headline{font-family:'Bebas Neue',cursive;font-size:clamp(36px,4.5vw,64px);line-height:1;margin-bottom:24px;letter-spacing:.02em;}
.hp-headline em{color:var(--purple);font-style:normal;}
.hp-body{font-size:17px;line-height:1.85;color:rgba(240,238,232,.6);margin-bottom:20px;}
.hp-stmt{font-size:16px;line-height:1.8;color:var(--white);padding:16px 22px;background:rgba(123,79,255,.1);border-left:3px solid var(--purple);margin:18px 0;font-style:italic;}
.hp-stmt span{color:var(--purple-light);}
.hp-alert{background:rgba(200,23,122,.1);border:1px solid rgba(200,23,122,.25);border-left:3px solid var(--fuchsia);padding:16px 20px;}
.hp-alert p{font-size:15px;line-height:1.75;color:rgba(240,238,232,.8);}
.hp-alert p strong{color:var(--fuchsia);}

/* ══ WHITE STATS ══ */
.panel-white-problem{background:#f5f5f0;color:#050505;}
.wp-inner{max-width:1200px;width:100%;padding:0 80px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.wp-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.4em;text-transform:uppercase;color:var(--purple);margin-bottom:32px;}
.wp-statement{font-family:'Bebas Neue',cursive;font-size:clamp(3rem,6vw,5.5rem);line-height:.95;color:#050505;}
.wp-statement .highlight{color:var(--purple);}
.wp-right{display:flex;flex-direction:column;gap:28px;}
.wp-stat-block{border-left:3px solid var(--purple);padding-left:28px;}
.wp-stat-number{font-family:'Bebas Neue',cursive;font-size:3.8rem;color:var(--purple);line-height:1;}
.wp-stat-desc{font-size:1rem;color:rgba(5,5,5,.7);margin-top:4px;line-height:1.6;}

/* ══ CHALLENGE CARDS ══ */
.panel-challenge{background:#060610;}
.ch-outer{width:100%;height:100%;display:grid;grid-template-columns:270px 1fr;}
.ch-left{padding:72px 40px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid rgba(255,255,255,.06);background:var(--dark);}
.ch-headline{font-family:'Bebas Neue',cursive;font-size:clamp(36px,4.8vw,62px);line-height:.95;letter-spacing:.02em;margin-bottom:20px;}
.ch-headline em{color:var(--fuchsia);font-style:normal;}
.ch-sub{font-size:16px;line-height:1.8;color:rgba(240,238,232,.45);margin-bottom:24px;}
.ch-note{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;color:var(--fuchsia);line-height:1.6;padding:14px 18px;background:rgba(200,23,122,.1);border-left:2px solid var(--fuchsia);}
.ch-right{padding:48px 48px;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr auto;gap:1px;background:rgba(255,255,255,.05);}
.ch-card{background:#060610;padding:28px 22px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:background .3s;}
.ch-card:hover{background:rgba(123,79,255,.07);}
.ch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.ch-card.c1::before{background:var(--fuchsia);}
.ch-card.c2::before{background:var(--purple);}
.ch-card.c3::before{background:var(--yellow);}
.ch-num{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:.15em;margin-bottom:8px;}
.ch-card.c1 .ch-num{color:var(--fuchsia);}
.ch-card.c2 .ch-num{color:var(--purple-light);}
.ch-card.c3 .ch-num{color:var(--yellow);}
.ch-title{font-family:'Bebas Neue',cursive;font-size:clamp(18px,2vw,28px);line-height:1;margin-bottom:12px;}
.ch-card.c1 .ch-title{color:var(--fuchsia);}
.ch-card.c2 .ch-title{color:var(--purple-light);}
.ch-card.c3 .ch-title{color:var(--yellow);}
.ch-items{display:flex;flex-direction:column;}
.ch-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.ch-item:last-child{border-bottom:none;}
.ch-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.ch-card.c1 .ch-dot{background:var(--fuchsia);}
.ch-card.c2 .ch-dot{background:var(--purple-light);}
.ch-card.c3 .ch-dot{background:var(--yellow);}
.ch-text{font-size:13px;line-height:1.55;color:rgba(240,238,232,.65);}
.ch-bottom{grid-column:1/-1;background:rgba(123,79,255,.1);border-top:1px solid rgba(123,79,255,.2);padding:14px 22px;display:flex;align-items:center;gap:16px;}
.ch-bottom-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--purple-light);flex-shrink:0;}
.ch-bottom-txt{font-size:14px;color:rgba(240,238,232,.6);line-height:1.4;}

/* ══ TREND DETAIL ══ */
.panel-trend{background:#060610;}
.trend-inner{width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr;align-items:stretch;}
.trend-left{padding:72px 56px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid rgba(255,255,255,.06);}
.trend-right{padding:72px 48px;display:flex;flex-direction:column;gap:16px;justify-content:center;}
.trend-lede{font-size:17px;line-height:1.8;color:rgba(240,238,232,.65);margin-bottom:22px;}
.data-trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px;}
.data-cell{padding:14px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);}
.data-cell strong{display:block;font-family:'Bebas Neue',cursive;font-size:30px;color:var(--yellow);line-height:.9;margin-bottom:8px;}
.data-cell span{font-size:12px;color:rgba(240,238,232,.5);line-height:1.45;}
.ex-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);padding:14px 18px;}
.ex-card h4{font-family:'Bebas Neue',cursive;font-size:19px;color:var(--purple-light);margin-bottom:6px;}
.ex-card p{font-size:13px;line-height:1.6;color:rgba(240,238,232,.55);}
.trend-implication{background:rgba(123,79,255,.08);border-left:3px solid var(--purple);padding:14px 18px;}
.trend-implication-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;color:var(--purple-light);text-transform:uppercase;margin-bottom:6px;}
.trend-implication p{font-size:14px;line-height:1.75;color:rgba(240,238,232,.7);}

/* ══ SYNTHESIS ══ */
.synth-outer{width:100%;padding:0 80px;}
.synth-hl{font-family:'Bebas Neue',cursive;font-size:clamp(40px,6vw,80px);line-height:.95;margin-bottom:48px;}
.synth-hl em{color:var(--fuchsia);font-style:normal;}
.synth-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.06);margin-bottom:32px;}
.synth-card{background:#060610;padding:40px 32px;}
.synth-num{font-family:'Bebas Neue',cursive;font-size:64px;color:transparent;-webkit-text-stroke:1px rgba(123,79,255,.3);line-height:1;margin-bottom:12px;}
.synth-title{font-family:'Bebas Neue',cursive;font-size:clamp(24px,2.5vw,36px);color:var(--white);line-height:1;margin-bottom:16px;}
.synth-body{font-size:16px;line-height:1.75;color:rgba(240,238,232,.55);}
.synth-callout{background:rgba(123,79,255,.08);border:1px solid rgba(123,79,255,.2);padding:24px 32px;}
.synth-callout p{font-size:18px;line-height:1.75;color:rgba(240,238,232,.75);}

/* ══ ROLE / SERVICES ══ */
.panel-role{background:var(--black);}
.role-outer{width:100%;height:100%;display:grid;grid-template-columns:310px 1fr;}
.role-left{padding:72px 40px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid rgba(255,255,255,.06);background:var(--dark);}
.role-headline{font-family:'Bebas Neue',cursive;font-size:clamp(32px,4vw,54px);line-height:.95;letter-spacing:.02em;margin-bottom:16px;}
.role-headline em{color:var(--purple);font-style:normal;}
.role-sub{font-size:15px;line-height:1.75;color:rgba(240,238,232,.45);margin-bottom:24px;}
.role-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(123,79,255,.15);border:1px solid rgba(123,79,255,.3);padding:12px 16px;}
.role-badge strong{font-family:'Bebas Neue',cursive;font-size:18px;color:var(--yellow);}
.role-badge span{font-size:13px;color:rgba(255,255,255,.6);}
.role-right{padding:52px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:rgba(255,255,255,.05);}
.role-card{background:var(--black);padding:28px 26px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;transition:background .4s;}
.role-card:hover{background:rgba(123,79,255,.07);}
.role-card::after{content:'';position:absolute;bottom:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--purple),var(--yellow));transition:width .4s ease;}
.role-card:hover::after{width:100%;}
.role-num{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:.15em;color:var(--purple);}
.role-title{font-family:'Bebas Neue',cursive;font-size:clamp(22px,2.2vw,34px);line-height:1;color:var(--white);}
.role-items{display:flex;flex-direction:column;margin-top:auto;}
.role-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.role-item:last-child{border-bottom:none;}
.role-arr{font-family:'DM Mono',monospace;font-size:11px;color:var(--purple);flex-shrink:0;}
.role-txt{font-size:13px;line-height:1.5;color:rgba(240,238,232,.6);}

/* ══ CLOSE — Challenge Cards layout, "How Can Play Help You" ══ */
.panel-close-ch{background:#060610;}
.close-ch-outer{width:100%;height:100%;display:grid;grid-template-columns:270px 1fr;}
.close-ch-left{padding:72px 40px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid rgba(255,255,255,.06);background:var(--dark);}
.close-ch-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.4em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:16px;}
.close-ch-headline{font-family:'Bebas Neue',cursive;font-size:clamp(38px,5vw,64px);line-height:.95;letter-spacing:.02em;margin-bottom:20px;}
.close-ch-headline .hl-y{color:var(--yellow);}
.close-ch-sub{font-size:16px;line-height:1.8;color:rgba(240,238,232,.45);margin-bottom:24px;}
.close-ch-note{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;color:var(--yellow);line-height:1.6;padding:14px 18px;background:rgba(245,230,66,.08);border-left:2px solid var(--yellow);}
.close-ch-right{padding:48px 48px;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr auto;gap:1px;background:rgba(255,255,255,.05);}
.close-card{background:#060610;padding:28px 22px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:background .3s;}
.close-card:hover{background:rgba(123,79,255,.07);}
.close-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.close-card.a1::before{background:var(--purple);}
.close-card.a2::before{background:var(--fuchsia);}
.close-card.a3::before{background:var(--yellow);}
.close-card-num{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:.15em;margin-bottom:8px;}
.close-card.a1 .close-card-num{color:var(--purple-light);}
.close-card.a2 .close-card-num{color:var(--fuchsia);}
.close-card.a3 .close-card-num{color:var(--yellow);}
.close-card-title{font-family:'Bebas Neue',cursive;font-size:clamp(18px,2vw,28px);line-height:1;margin-bottom:12px;}
.close-card.a1 .close-card-title{color:var(--purple-light);}
.close-card.a2 .close-card-title{color:var(--fuchsia);}
.close-card.a3 .close-card-title{color:var(--yellow);}
.close-card-items{display:flex;flex-direction:column;}
.close-card-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.close-card-item:last-child{border-bottom:none;}
.close-card-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.close-card.a1 .close-card-dot{background:var(--purple-light);}
.close-card.a2 .close-card-dot{background:var(--fuchsia);}
.close-card.a3 .close-card-dot{background:var(--yellow);}
.close-card-text{font-size:13px;line-height:1.55;color:rgba(240,238,232,.65);}
.close-ch-bottom{grid-column:1/-1;background:rgba(245,230,66,.07);border-top:1px solid rgba(245,230,66,.2);padding:14px 22px;display:flex;align-items:center;gap:16px;}
.close-ch-bottom-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--yellow);flex-shrink:0;}
.close-ch-bottom-txt{font-size:14px;color:rgba(240,238,232,.6);line-height:1.4;}

/* ══ NOTES / APPENDIX ══ */
.panel-notes{background:#060610;}
.notes-outer{width:100%;padding:0 80px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
.notes-headline{font-family:'Bebas Neue',cursive;font-size:clamp(40px,5vw,72px);line-height:.95;grid-column:1/-1;margin-bottom:40px;}
.notes-headline .hl{color:var(--fuchsia);}
.col-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06);}
.source-item{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;line-height:1.6;color:rgba(240,238,232,.55);}
.source-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--purple-light);flex-shrink:0;min-width:22px;}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursor-follower"></div>

<div id="preloader">
  <div class="pl-logo">HAVAS PLAY</div>
  <div class="pl-bar"><div class="pl-progress"></div></div>
  <div class="pl-sub">Loading</div>
</div>

<div id="progress-bar"></div>

<nav>
  <a class="nav-logo" href="#">HAVAS <span>PLAY</span></a>
  <div class="nav-right">
    <div class="nav-label" id="navLabel">01 / 17</div>
    <div class="nav-dots" id="navDots"></div>
  </div>
</nav>

<div id="scroll-hint">
  <span class="hint-text">Scroll</span>
  <div class="hint-arrow"><span></span><span></span></div>
</div>



<script>
// CURSOR
const cursor=document.getElementById('cursor');
const follower=document.getElementById('cursor-follower');
let mouseX=0,mouseY=0,followerX=0,followerY=0;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;cursor.style.left=mouseX+'px';cursor.style.top=mouseY+'px';});
(function animateCursor(){followerX+=(mouseX-followerX)*.12;followerY+=(mouseY-followerY)*.12;follower.style.left=followerX+'px';follower.style.top=followerY+'px';requestAnimationFrame(animateCursor);})();

// PRELOADER
window.addEventListener('load',()=>setTimeout(()=>document.getElementById('preloader').classList.add('hidden'),2600));

// SCROLL ENGINE — 17 panels
const PANEL_COUNT=17;
const navDots=document.getElementById('navDots');
for(let i=0;i<PANEL_COUNT;i++){const d=document.createElement('div');d.className='nav-dot'+(i===0?' active':'');d.addEventListener('click',()=>scrollToPanel(i));navDots.appendChild(d);}
const wrapper=document.getElementById('panels-wrapper');
const progressBar=document.getElementById('progress-bar');
const scrollHint=document.getElementById('scroll-hint');
const navLabel=document.getElementById('navLabel');
let currentPanel=0,isScrolling=false,targetX=0,currentX=0;
function scrollToPanel(index){if(index<0||index>=PANEL_COUNT||isScrolling)return;currentPanel=index;targetX=index*window.innerWidth;updateUI();animateScroll();}
function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function animateScroll(){isScrolling=true;const startX=currentX,startTime=performance.now();function step(now){const p=Math.min((now-startTime)/900,1);currentX=startX+(targetX-startX)*easeInOutCubic(p);wrapper.style.transform=`translateX(${-currentX}px)`;if(p<1){requestAnimationFrame(step);}else{currentX=targetX;isScrolling=false;triggerReveal(currentPanel);}}requestAnimationFrame(step);}
function updateUI(){const pct=(currentPanel/(PANEL_COUNT-1))*100;progressBar.style.width=pct+'%';document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===currentPanel));scrollHint.classList.toggle('hidden',currentPanel>0);if(navLabel)navLabel.textContent=String(currentPanel+1).padStart(2,'0')+' / '+String(PANEL_COUNT).padStart(2,'0');}
function triggerReveal(idx){const panel=document.querySelector(`[data-panel="${idx}"]`);if(!panel)return;panel.querySelectorAll('.reveal-el').forEach((el,i)=>setTimeout(()=>el.classList.add('revealed'),i*70));}
setTimeout(()=>triggerReveal(0),2800);
let wQueue=0,wTimer=null;
document.addEventListener('wheel',e=>{e.preventDefault();if(isScrolling)return;clearTimeout(wTimer);wQueue+=e.deltaY;wTimer=setTimeout(()=>{if(Math.abs(wQueue)>30){wQueue>0?scrollToPanel(currentPanel+1):scrollToPanel(currentPanel-1);}wQueue=0;},50);},{passive:false});
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{const diff=touchStartX-e.changedTouches[0].clientX;if(Math.abs(diff)>60){diff>0?scrollToPanel(currentPanel+1):scrollToPanel(currentPanel-1);}});
document.addEventListener('keydown',e=>{if(isScrolling)return;if(e.key==='ArrowRight'||e.key==='ArrowDown')scrollToPanel(currentPanel+1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')scrollToPanel(currentPanel-1);});
window.addEventListener('resize',()=>{targetX=currentPanel*window.innerWidth;currentX=targetX;wrapper.style.transform=`translateX(${-currentX}px)`;});
updateUI();
</script>
</body>
</html>
